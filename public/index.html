<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <meta name="theme-color" content="#20262D" />
  <meta name="description" content="AryadMoney — Votre portefeuille mobile" />

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AryadMoney">

  <title>AryadMoney</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Icons (IMPORTANT: chemins ABSOLUS) -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/manifest-icon-192.maskable.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/manifest-icon-512.maskable.png" />
  <link rel="apple-touch-icon" href="/icons/manifest-icon-192.maskable.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- App CSS -->
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>

  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-logo">
      <div class="splash-icon">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
          <rect width="64" height="64" rx="16" fill="#DAAE54"/>
          <path d="M32 12C21 12 12 21 12 32C12 43 21 52 32 52C43 52 52 43 52 32C52 21 43 12 32 12Z" fill="white" fill-opacity="0.15"/>
          <path d="M22 32H42M32 22V42" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <circle cx="32" cy="32" r="6" fill="white" fill-opacity="0.3"/>
        </svg>
      </div>
      <span class="splash-name">AryadMoney</span>
    </div>
    <div class="splash-loader">
      <div class="splash-bar"></div>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">

    <div id="toast-container"></div>

    <div id="modal-overlay" class="hidden"></div>
    <div id="modal-container" class="hidden"></div>

    <div id="view-container"></div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="bottom-nav hidden">
      <button class="nav-item active" data-route="home">
        🏠 <span>Accueil</span>
      </button>

      <button class="nav-item" data-route="recharge">
        💳 <span>Recharge</span>
      </button>

      <button class="nav-item nav-fab" data-route="virement">
        ✈️ <span>Virement</span>
      </button>

      <button class="nav-item" data-route="retrait">
        📤 <span>Retrait</span>
      </button>

      <button class="nav-item" data-route="gerer">
        👤 <span>Compte</span>
      </button>
    </nav>

  </div>

  <!-- Scripts -->
  <script src="/api.js"></script>
  <script src="/app.js"></script>

  <!-- SERVICE WORKER (CRITIQUE POUR PWA INSTALL) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .then(() => console.log('✅ Service Worker OK'))
        .catch(err => console.log('❌ SW Error:', err));
    }
  </script>

</body>
</html>
