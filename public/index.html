<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#20262D" />
  <meta name="description" content="AryadMoney — Votre portefeuille mobile" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AryadMoney" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AryadMoney</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json" />

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/manifest-icon-192.maskable.png" />
  <link rel="apple-touch-icon" href="./icons/manifest-icon-192.maskable.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- App CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-logo">
      <div class="splash-icon">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
          <rect width="64" height="64" rx="16" fill="#DAAE54"/>
          <path d="M32 12C21 12 12 21 12 32C12 43 21 52 32 52C43 52 52 43 52 32C52 21 43 12 32 12Z" fill="white" fill-opacity="0.15"/>
          <path d="M22 32H42M32 22V42" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <circle cx="32" cy="32" r="6" fill="white" fill-opacity="0.3"/>
        </svg>
      </div>
      <span class="splash-name">AryadMoney</span>
    </div>
    <div class="splash-loader">
      <div class="splash-bar"></div>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app" class="hidden">

    <!-- Toast notifications -->
    <div id="toast-container"></div>

    <!-- Modal overlay -->
    <div id="modal-overlay" class="hidden"></div>
    <div id="modal-container" class="hidden"></div>

    <!-- Router Views -->
    <div id="view-container"></div>

    <!-- Bottom Navigation (shown when authenticated) -->
    <nav id="bottom-nav" class="bottom-nav hidden">
      <button class="nav-item active" data-route="home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Accueil</span>
      </button>
      <button class="nav-item" data-route="recharge">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span>Recharge</span>
      </button>
      <button class="nav-item nav-fab" data-route="virement">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        <span>Virement</span>
      </button>
      <button class="nav-item" data-route="retrait">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        <span>Retrait</span>
      </button>
      <button class="nav-item" data-route="gerer">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
        <span>Compte</span>
      </button>
    </nav>

  </div>

  <!-- Scripts -->
  <script src="../assets/api.js"></script>
  <script src="../assets/app.js"></script>

</body>
</html>
